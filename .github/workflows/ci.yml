name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck + tests (${{ matrix.os }})
    # 3-OS matrix: the save/write pipeline (tests/desktop) does real
    # filesystem work — stat-based existence checks, tmp+rename atomic
    # writes, ancestor walks for the Save-As dialog — whose semantics
    # genuinely differ across ext4/APFS/NTFS, so Linux-only CI left
    # Windows behavior untested. Linux + mac run the full suite;
    # Windows starts scoped to tests/desktop (the fs-touching layer)
    # until the rest of the suite is verified clean on win32.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: windows-latest
            test-scope: tests/desktop
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install desktop dependencies
        # apps/desktop is intentionally NOT in the workspaces array
        # (electron-builder's internal install step prunes hoisted
        # dev-deps mid-build under npm workspaces — same workaround
        # as in release.yml). The root typecheck reaches into
        # apps/desktop/src via the tests/desktop test files'
        # imports, so electron's types must be present here too.
        run: npm --prefix apps/desktop ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        # File-dependent round-trip / mark-fidelity suites discover
        # fixtures via CARDMIRROR_DOCS_DIR (default `reference-docs/
        # example docs/`). On CI there are no fixtures, so those suites
        # skip cleanly and the rest of the test surface still runs.
        env:
          # The heavy transclusion/collab fuzz suites peak past the default
          # ~4 GB V8 heap on a CI runner (they build megabyte-scale docs and
          # many Loro peers). Give the vitest fork workers more headroom.
          NODE_OPTIONS: --max-old-space-size=6144
        # An empty test-scope (linux/mac) runs the full suite.
        run: npm test -- ${{ matrix.test-scope }}
