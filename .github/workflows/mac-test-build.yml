name: macOS test build

# Manually triggered macOS desktop build for testing — produces
# arm64 and x64 `.dmg` installers and uploads them as workflow
# artifacts that can be downloaded from the run page. Unlike the
# tag-triggered `release.yml`, this one does NOT cut a GitHub
# Release or publish anything; it's a fast iteration path for
# verifying macOS-specific fixes (perf tuning, signing tweaks,
# entitlements changes, etc.) on real Apple hardware without
# going through a versioned release cycle.
#
# Run from the Actions tab → "macOS test build" → "Run workflow",
# or via `gh workflow run mac-test-build.yml`.

on:
  workflow_dispatch:

jobs:
  build:
    name: Build mac dmg
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        # Mirrors release.yml — apps/desktop intentionally isn't in
        # the npm workspaces array because electron-builder's internal
        # install step prunes hoisted dev-deps mid-build. Install
        # separately.
        run: npm --prefix apps/desktop ci

      - name: Bundle both macOS koffi arch binaries
        # macos-latest runners are Apple Silicon, so the `ci` above only
        # installs koffi's arm64 native package (@koromix/koffi-darwin-*
        # are optional deps gated on `cpu`). electron-builder builds BOTH
        # the x64 and arm64 dmgs from that install, so without this the x64
        # dmg ships with no koffi binary and Intel Macs hit "Cannot find the
        # native Koffi module". Force-install both arch packages at koffi's
        # own version; --force bypasses the cpu guard, --no-save keeps the
        # lockfile clean. Mirrors release.yml.
        run: |
          KOFFI_VER=$(node -p "require('./apps/desktop/node_modules/koffi/package.json').version")
          npm --prefix apps/desktop install --no-save --force \
            "@koromix/koffi-darwin-x64@$KOFFI_VER" \
            "@koromix/koffi-darwin-arm64@$KOFFI_VER"

      - name: Build desktop installer
        # `dist` runs `electron-builder` with no explicit publish
        # flag. electron-builder's default in CI is to try to
        # publish whenever the package.json has a `publish` block
        # configured — which ours does (for the tag-triggered
        # release.yml). On workflow_dispatch we don't want to
        # publish anything; pass `--publish never` to short-
        # circuit. The trailing `--` flows through the
        # `npm run` → `dist` → `electron-builder` chain because
        # the script ends with a bare `electron-builder` call.
        run: npm --prefix apps/desktop run dist -- --publish never

      - name: Upload macOS dmg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cardmirror-mac-dmg
          path: apps/desktop/release/*.dmg
          if-no-files-found: error
          retention-days: 14
